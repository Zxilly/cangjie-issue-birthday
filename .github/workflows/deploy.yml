name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 并发：新推送取消同分支正在跑的部署，避免旧构建覆盖新构建
concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # 用 wrangler 部署 dist + functions/。仅需 CLOUDFLARE_API_TOKEN 这一个仓库 secret；
      # account id 不敏感（出现在 dashboard URL 里），直接内联。
      # client_secret 是 Pages 项目级 Secret（wrangler pages secret put 设置），与部署解耦，CI 不经手。
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e4e9b62d2717b0bcb1c0504b2a7e9a16
          # --branch=main 标记为生产部署（项目生产分支即 main）
          command: pages deploy --project-name=cangjie-issue-birthday --branch=main
